<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CrewMate</title>
<style>
  :root{--navy:#1B2A4A;--brass:#B08D57;--ink:#23262D;--muted:#5A5F6B;--line:#E3E1DA;--bg:#FBFAF7;--soft:#F4F2EC;}
  *{box-sizing:border-box;} html{-webkit-text-size-adjust:100%;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.6;font-size:16px;}
  .wrap{max-width:760px;margin:0 auto;padding:32px 22px 80px;}
  header.brand{display:flex;justify-content:space-between;align-items:baseline;border-bottom:2px solid var(--brass);padding-bottom:14px;margin-bottom:8px;}
  .brand .name{font-size:14px;letter-spacing:.14em;text-transform:uppercase;color:var(--brass);font-weight:700;}
  .brand nav a{font-size:13px;color:var(--brass);text-decoration:none;}
  .brand nav a:hover{color:var(--navy);text-decoration:underline;}
  .brand nav .sep{color:var(--muted);font-size:13px;}
  h1{color:var(--navy);font-size:30px;line-height:1.2;margin:.35em 0 .15em;}
  h2{color:var(--navy);font-size:20px;margin:1.8em 0 .5em;}
  h3{color:var(--navy);font-size:16px;margin:1.3em 0 .4em;}
  a{color:var(--brass);}
  .meta{color:var(--muted);font-size:13.5px;margin:.2em 0 0;}
  hr{border:none;border-top:1px solid var(--line);margin:1.8em 0;}
  table{width:100%;border-collapse:collapse;margin:1em 0;font-size:14.5px;display:block;overflow-x:auto;}
  th,td{border:1px solid var(--line);padding:9px 11px;text-align:left;vertical-align:top;}
  th{background:var(--navy);color:#fff;font-weight:600;}
  tr:nth-child(even) td{background:var(--soft);}
  blockquote{background:#FFF7EC;border:1px solid var(--brass);border-left:5px solid var(--brass);border-radius:8px;margin:1.2em 0;padding:14px 18px;color:#5b4a30;}
  blockquote p{color:#5b4a30;} blockquote strong{color:#3d2f17;}
  code{background:var(--soft);padding:1px 5px;border-radius:4px;font-size:90%;}
  footer.legal{margin-top:48px;padding-top:16px;border-top:1px solid var(--line);color:var(--muted);font-size:13px;}
  @media (max-width:520px){h1{font-size:25px;} .wrap{padding:24px 16px 64px;} header.brand{flex-direction:column;gap:6px;} .brand nav a{margin:0 14px 0 0;}}
</style>
</head>
<body>
<div class="wrap">
<header class="brand"><span class="name">CrewMate</span><nav><a href="/privacy/">Privacy</a><span class="sep">&nbsp;|&nbsp;</span><a href="/terms/">Terms</a></nav></header>
<h1>CrewMate</h1>
<p class="meta">Operational tools for airline cabin crew and flight crew.</p>
<hr>
<p>Legal:</p>
<ul>
  <li><a href="/privacy/">Privacy Policy</a></li>
  <li><a href="/terms/">Terms of Use</a></li>
</ul>
<p class="meta">Questions? <a href="mailto:support@getcrewmate.app">support@getcrewmate.app</a></p>
<footer class="legal">CrewMate is a product of WeisMon Holdings LLC. &nbsp;·&nbsp; Contact: <a href="mailto:support@getcrewmate.app">support@getcrewmate.app</a></footer>
</div>
</body>
</html>
